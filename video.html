<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ViralHUB</title>

<style>
body{
margin:0;
background:#111;
color:white;
font-family:Arial;
padding:20px;
}

.play-btn{
display:block;
background:#ff9900;
color:black;
text-align:center;
padding:15px;
margin-top:20px;
font-weight:bold;
text-decoration:none;
border-radius:5px;
}

.main-thumb img{
width:100%;
aspect-ratio:16/9;
object-fit:cover;
border-radius:8px;
}

.related-grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
margin-top:15px;
}

.related-item{
border-radius:8px;
overflow:hidden;
}

.related-item img{
width:100%;
aspect-ratio:16/9;
object-fit:cover;
display:block;
border-radius:6px;
}

.related-title{
font-size:13px;
margin:5px 0 2px 0;
color:white;
}

.related-views{
font-size:12px;
color:#aaa;
margin:0;
}

@media(min-width:768px){
.related-grid{
grid-template-columns:repeat(4,1fr);
}
}
.pagination{
display:flex;
justify-content:center;
gap:8px;
margin-top:25px;
}

.pagination a{
padding:8px 12px;
background:#1a1a1a;
color:#ccc;
text-decoration:none;
border-radius:6px;
font-size:14px;
transition:0.3s;
}

.pagination a:hover{
background:#333;
color:white;
}

.pagination .active{
background:#ff9900;
color:black;
font-weight:bold;
}  
.action-bar{
display:flex;
justify-content:space-between;
align-items:center;
margin-top:15px;
padding:10px 0;
border-bottom:1px solid #222;
font-size:14px;
color:#ccc;
flex-wrap:wrap;
gap:10px;
}

.left-actions,
.right-actions{
display:flex;
gap:15px;
flex-wrap:wrap;
}

.action-bar span{
cursor:pointer;
transition:0.3s;
}

.action-bar span:hover{
color:#ff9900;
}
.action-bar a{
color:inherit;        /* ikut warna parent */
text-decoration:none; /* hilangin garis bawah */
}

.action-bar a:visited{
color:inherit;        /* biar gak jadi ungu */
}

.action-bar a:hover{
color:#ff9900;        /* hover tetap kuning */
}  
/* tombol aktif jadi biru */
.action-bar .active-like,
.action-bar .active-dislike{
color:#00aaff;
font-weight:bold;
}
.main-thumb{
position:relative;
}

.fake-play{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%, -50%);
background:rgba(0,0,0,0.6);
width:70px;
height:70px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:30px;
color:white;
pointer-events:none; /* penting! biar gak bisa diklik */

.access-count{
margin-top:10px;
font-size:14px;
color:#ccc;
text-align:center;
}
  
</style>
</head>
<div style="text-align:center;margin-bottom:15px;">
<h2 style="margin:0;font-size:22px;font-weight:bold;color:#ff9900;text-shadow:0 0 10px #ff9900;">
ViralHUB

<h1 id="videoTitle" style="text-align:center;font-size:20px;margin-top:20px;"></h1>

<div class="main-thumb">
<img id="mainImage">
<div class="fake-play">▶</div>
</div>
<div class="action-bar">

<div class="left-actions">
<span>👁 <span id="mainViews2"></span></span>
<span id="likeBtn">👍 <span id="likePercent"></span></span>
<span id="dislikeBtn">👎 <span id="dislikePercent"></span></span>
</div>
<div class="right-actions">
<a href="https://linkkomen.com" target="_blank">💬 <span id="commentCount"></span></a>
<a href="https://linkdownload.com" target="_blank">⬇ Unduh</a>
<a href="https://linkshare.com" target="_blank">🔗 Bagikan</a>
</div>

</div>
</div>

</div>

<!-- SOCIAL PROOF -->
<div class="access-count">

</div>

<h3 style="margin-top:30px;">VIDEO POPULER</h3>

<script>
const videos = [
{
title: "Nay tiktokers cantik tobrut asal Bandung",
image: "thumb1.jpg"
},
{
title: "BOCIL CHINDO YANG DI 3W3 GURUNYA",
image: "thumb2.jpg"
},
{
title: "ANDINI PERMATA X ADIK",
image: "thumb3.jpg"
},
{
title: "Tiara Kartika tiktokers cantik yang VCS sama mantannya.",
image: "thumb4.jpg"
},
{
title: "FULL BOTOL VIRAL MASUK MEMIAW",
image: "thumb5.jpg"
},
{
title: "CIKGU NISA VIRAL",
image: "thumb6.jpg"
},
{
title: "BUKTI CCRV INARA RUSLI",
image: "thumb7.jpg"
},
{
title: "Andini Permata Viral WORLD",
image: "thumb8.jpg"
},
{
title: "Hilda Pricillya",
image: "thumb9.jpg"
},
{
title: "KORBAN SULTAN MALAYSIA",
image: "thumb10.jpg"
},
{  
title: "EVAANURR",
image: "thumb11.jpg"  
}   
];

function randomViews(){
return (Math.floor(Math.random()*800000)+20000)
.toString().replace(/\B(?=(\d{3})+(?!\d))/g,".");
}

const params = new URLSearchParams(window.location.search);
let id = parseInt(params.get("id"));

if(isNaN(id) || id < 0 || id >= videos.length){
id = 0;
}

document.getElementById("videoTitle").innerText = videos[id].title;
document.getElementById("mainImage").src = videos[id].image;
document.getElementById("mainViews2").innerText = randomViews()+" views";
// ==== RANDOM FUNCTION ====
function randomLike(){
return Math.floor(Math.random()*6)+94;
}

function randomComments(){
return Math.floor(Math.random()*300)+10;
}

// ==== SET DATA ====
document.getElementById("mainViews2").innerText = randomViews()+" views";

let like = randomLike();
document.getElementById("likePercent").innerText = like+"%";
document.getElementById("dislikePercent").innerText = (100-like)+"%";

document.getElementById("commentCount").innerText = randomComments();
  
const related = document.getElementById("relatedVideos");

function randomDuration(){
return Math.floor(Math.random() * 8) + 5; 
// 5 sampai 12 (karena 5 + 0-7)
}  
videos.forEach((video,index)=>{
if(index !== id){
related.innerHTML += `
<div class="related-item">
<a href="video.html?id=${index}" style="text-decoration:none;color:white;">
<img src="${video.image}">
<p class="related-title">${video.title}</p>
<p class="related-views">
${randomViews()} views • ${randomDuration()} min
</p>
</a>
</div>
`;
}
});
 const likeBtn = document.getElementById("likeBtn");
const dislikeBtn = document.getElementById("dislikeBtn");

likeBtn.addEventListener("click", function(){
likeBtn.classList.toggle("active-like");
dislikeBtn.classList.remove("active-dislike");
});

dislikeBtn.addEventListener("click", function(){
dislikeBtn.classList.toggle("active-dislike");
likeBtn.classList.remove("active-like");
}); 

let accessCount = Math.floor(Math.random()*5000)+8000;

const accessElement = document.getElementById("accessCount");

function updateAccess(){
let increase = Math.floor(Math.random()*5)+1;
accessCount += increase;
accessElement.innerText = accessCount.toLocaleString("id-ID");
}

updateAccess();
setInterval(updateAccess, 3000);  
</script>

</body>
</html>

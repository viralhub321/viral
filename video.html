<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ViralHub</title>

<style>
body{
margin:0;
background:#111;
color:white;
font-family:Arial;
padding:20px;
}

.play-btn{
display:block;
background:#ff9900;
color:black;
text-align:center;
padding:15px;
margin-top:20px;
font-weight:bold;
text-decoration:none;
border-radius:5px;
}

.main-thumb img{
width:100%;
aspect-ratio:4/5;
object-fit:cover;
border-radius:8px;
}

.related-grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
margin-top:15px;
}

.related-item{
border-radius:8px;
overflow:hidden;
}

.related-item img{
width:100%;
aspect-ratio:4/5;
object-fit:cover;
display:block;
}

.related-title{
font-size:13px;
margin:5px 0 2px 0;
color:white;
}

.related-views{
font-size:12px;
color:#aaa;
margin:0;
}

@media(min-width:768px){
.related-grid{
grid-template-columns:repeat(4,1fr);
}
}
</style>
</head>
<div style="text-align:center;margin-bottom:15px;">
<h2 style="margin:0;font-size:22px;font-weight:bold;color:#ff9900;text-shadow:0 0 10px #ff9900;">
ViralHub
</h2>


<h1 id="videoTitle" style="text-align:center;font-size:20px;margin-top:20px;"></h1>

<h1 id="videoTitle"></h1>

<div class="main-thumb">
<img id="mainImage">
</div>

<p id="mainViews" style="color:#aaa;font-size:14px;"></p>

<a href="https://lucentanxiouslyfleeting.com/xzinutpye0?key=995e9a44df2051b7e72d8fba117c3c6f" class="play-btn">

</a>
<a href="18plus.html" class="play-btn">
Klik Disini Jika Error ❗
</a>

<script>
const videos = [

image: "thumb2.jpg"
},
{

},
{

image: "thumb4.jpg"
},
{
title: "FULL BOTOL VIRAL MASUK MEMIAW",

},
{
title: "CIKGU NISA VIRAL",
image: "thumb6.jpg"
}
title: "BUKTI CCRV INARA RUSLI",
image: "thumb7.jpg"
},
{
title: "Andini Permata Viral WORLD",
image: "thumb8.jpg"
},
{

image: "thumb9.jpg"
},
{
title: "KORBAN SULTAN MALAYSIA",
image: "thumb10.jpg"
},
{  
title: "EVAANURR",
image: "thumb11.jpg"  
}   
];

function randomViews(){
return (Math.floor(Math.random()*800000)+20000)
.toString().replace(/\B(?=(\d{3})+(?!\d))/g,".");
}

const params = new URLSearchParams(window.location.search);
let id = parseInt(params.get("id"));

if(isNaN(id) || id < 0 || id >= videos.length){
id = 0;
}

document.getElementById("videoTitle").innerText = videos[id].title;
document.getElementById("mainImage").src = videos[id].image;
document.getElementById("mainViews").innerText = randomViews()+" views";

const related = document.getElementById("relatedVideos");

videos.forEach((video,index)=>{
if(index !== id){
related.innerHTML += `
<div class="related-item">
<a href="video.html?id=${index}" style="text-decoration:none;color:white;">
<img src="${video.image}">
<p class="related-title">${video.title}</p>
<p class="related-views">${randomViews()} views</p>
</a>
</div>
`;
}
});
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Detail</title>

<style>
body{
margin:0;
background:#111;
color:white;
font-family:Arial;
padding:20px;
}

.play-btn{
display:block;
background:#ff9900;
color:black;
text-align:center;
padding:15px;
margin-top:20px;
font-weight:bold;
text-decoration:none;
border-radius:5px;
}

.main-thumb img{
width:100%;
aspect-ratio:4/5;
object-fit:cover;
border-radius:8px;
}

.related-grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
margin-top:15px;
}

.related-item{
border-radius:8px;
overflow:hidden;
}

.related-item img{
width:100%;
aspect-ratio:4/5;
object-fit:cover;
display:block;
}

.related-title{
font-size:13px;
margin:5px 0 2px 0;
color:white;
}

.related-views{
font-size:12px;
color:#aaa;
margin:0;
}

@media(min-width:768px){
.related-grid{
grid-template-columns:repeat(4,1fr);
}
}
</style>
</head>
<body>

<h1 id="videoTitle"></h1>

<div class="main-thumb">
<img id="mainImage">
</div>

<p id="mainViews" style="color:#aaa;font-size:14px;"></p>

<a href="LINK_ADSTERRA" class="play-btn">
▶ PLAY VIDEO
</a>

<h3 style="margin-top:30px;">Video Terkait</h3>
<div class="related-grid" id="relatedVideos"></div>

<script>
const videos = [
{
title: "Viral Cewek Indo",
<a href="video1.html?id=${index}">
},
{
title: "Skandal Terbaru 2026",
image: "thumb2.jpg"
},
{
title: "Trending Malam Ini",
image: "thumb3.jpg"
},
{
title: "Hot Update Hari Ini",
image: "thumb4.jpg"
},
{
title: "Rekaman Mengejutkan",
image: "thumb5.jpg"
},
{
title: "Viral TikTok Indo",
image: "thumb6.jpg"
}
];

function randomViews(){
return (Math.floor(Math.random()*800000)+20000)
.toString().replace(/\B(?=(\d{3})+(?!\d))/g,".");
}

const params = new URLSearchParams(window.location.search);
let id = parseInt(params.get("id"));

if(isNaN(id) || id < 0 || id >= videos.length){
id = 0;
}

document.getElementById("videoTitle").innerText = videos[id].title;
document.getElementById("mainImage").src = videos[id].image;
document.getElementById("mainViews").innerText = randomViews()+" views";

const related = document.getElementById("relatedVideos");

videos.forEach((video,index)=>{
if(index !== id){
related.innerHTML += `
<div class="related-item">
<a href="video.html?id=${index}" style="text-decoration:none;color:white;">
<img src="${video.image}">
<p class="related-title">${video.title}</p>
<p class="related-views">${randomViews()} views</p>
</a>
</div>
`;
}
});
</script>

</body>
</html>
